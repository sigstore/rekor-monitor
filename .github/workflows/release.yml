name: Create release

on:
  push:
    tags:
      - "v*"

# Prevent concurrent runs of this workflow, but do not cancel any in-progress
concurrency:
  group: "create-release"
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      attestations: write
      id-token: write

    # Require deployment review
    environment: release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "./go.mod"
          check-latest: true
          cache: false # avoid cache-poisoning attacks

      # Syft is used by GoReleaser to generate SBOMs
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # Initialize build arguments
      - name: Set build arguments
        run: |
          LDFLAGS=$(make ldflags)
          echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LDFLAGS: ${{ env.LDFLAGS }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ./dist/rekor-monitor-*
